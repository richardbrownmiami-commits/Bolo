name: Auto Research

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:
    inputs:
      topic:
        description: "Research topic"
        required: false
        default: "latest free AI tools and APIs 2025"

jobs:
  research:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: Research and append findings
        env:
          TOPIC: ${{ github.event.inputs.topic || 'latest free AI tools and APIs 2025' }}
        run: |
          echo ""
          echo "## Research: $TOPIC"
          echo "Date: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          
          # Call bolo worker
          RESULT=$(curl -s --max-time 25 -X POST https://bolo.richard-brown-miami.workers.dev/research \
            -H "Content-Type: application/json" \
            --data-raw "{\"topic\":\"$TOPIC\"}" || echo "{\"error\":\"worker unreachable\"}")
          echo "Worker result: $RESULT"
          
          # Check free OpenRouter models — fixed field parsing
          echo "Checking OpenRouter free models..."
          curl -s --max-time 15 "https://openrouter.ai/api/v1/models" > /tmp/or_models.json
          python3 << 'PYEOF'
import json
with open("/tmp/or_models.json") as f:
    d = json.load(f)
models = d.get("data", [])
free = [m for m in models if str(m.get("pricing", {}).get("prompt", "1")) == "0"]
print(f"Free models: {len(free)}")
for m in free[:8]:
    print("  -", m.get("id", "?"), "ctx:", m.get("context_length", "?"))
PYEOF
          
          # Append to findings.md
          {
            echo ""
            echo "---"
            echo "## Research: $TOPIC"
            echo "Date: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo "$RESULT"
          } >> findings.md
          
          git config user.email "bolo-bot@auto.dev"
          git config user.name "Bolo Bot"
          git add findings.md
          git diff --staged --quiet || git commit -m "research: auto findings $(date -u +%Y-%m-%d)"
          git push

