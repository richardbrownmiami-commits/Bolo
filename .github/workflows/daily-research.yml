name: Daily Research

on:
  workflow_dispatch:
    inputs:
      topic:
        description: 'Research topic'
        required: false
        default: 'latest free AI tools and APIs 2025'
  schedule:
    - cron: '0 8 * * *'

jobs:
  research:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: Check free OpenRouter models
        run: |
          echo "## Free Models $(date)" >> findings.md
          curl -s "https://openrouter.ai/api/v1/models" | python3 -c "
import sys, json
data = json.load(sys.stdin)
free = [m for m in data.get('data',[]) if str(m.get('pricing',{}).get('prompt','1'))=='0']
print(f'Total free models: {len(free)}')
for m in free[:8]:
    print(f'- {m.get("id", "?")}')
" >> findings.md

      - name: Research via bolo
        run: |
          TOPIC="${{ github.event.inputs.topic || 'latest free AI tools and APIs 2025' }}"
          echo "" >> findings.md
          echo "## Research: $TOPIC $(date)" >> findings.md
          curl -s --max-time 30 -X POST https://bolo.richard-brown-miami.workers.dev/research \
            -H "Content-Type: application/json" \
            -d "{\"topic\":\"$TOPIC\"}" | python3 -c "
import sys, json
try:
    d = json.load(sys.stdin)
    print(d.get('findings', 'No findings'))
except:
    print('Research response parse error')
" >> findings.md || echo "Research call failed" >> findings.md

      - name: Commit findings
        run: |
          git config user.email "bolo-bot@auto.dev"
          git config user.name "Bolo Bot"
          git add findings.md
          git diff --staged --quiet || git commit -m "research: auto findings $(date +%Y-%m-%d)"
          git push || echo "Nothing to push"
