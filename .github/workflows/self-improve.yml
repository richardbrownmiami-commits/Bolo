name: Self Improve

on:
  schedule:
    - cron: "0 8 * * *"  # daily at 8am UTC
  workflow_dispatch:

jobs:
  discover:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: Check free OpenRouter models
        run: |
          echo "## Free OpenRouter Models $(date)" >> findings.md
          curl -s "https://openrouter.ai/api/v1/models" | python3 -c "
import sys, json
data = json.load(sys.stdin)
models = data.get('data', [])
free = [m for m in models if str(m.get('pricing', {}).get('prompt', '1')) == '0']
print(f'Total free: {len(free)}')
for m in free[:10]:
    model_id = m.get('id', 'unknown')
    print(f'- {model_id}')
" >> findings.md

      - name: Research via bolo worker
        run: |
          echo "" >> findings.md
          echo "## AI Research $(date)" >> findings.md
          RESULT=$(curl -s -X POST https://bolo.richard-brown-miami.workers.dev/research \
            -H "Content-Type: application/json" \
            -d "{\"topic\":\"new free AI tools and APIs for autonomous agents 2025\"}" 2>/dev/null)
          echo "$RESULT" | python3 -c "
import sys, json
try:
    d = json.load(sys.stdin)
    print(d.get('findings', d.get('result', str(d)[:500])))
except:
    print(sys.stdin.read()[:500])
" >> findings.md || echo "Research endpoint unavailable" >> findings.md

      - name: Commit findings
        run: |
          git config user.email "bolo-agent@auto.dev"
          git config user.name "Bolo Agent"
          git add findings.md
          git diff --staged --quiet || git commit -m "chore: auto research findings $(date +%Y-%m-%d)"
          git push
